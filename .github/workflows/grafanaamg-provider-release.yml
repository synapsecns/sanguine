name: Grafana AMG Provider Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag, for example contrib/terraform-provider-grafanaamg/v0.0.1'
        required: true
        type: string

jobs:
  release:
    name: Release terraform-provider-grafanaamg
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@111c56156bcc6918c056dbef52164cfa583dc549
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build release assets
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
        run: |
          set -euo pipefail

          case "$RELEASE_TAG" in
            contrib/terraform-provider-grafanaamg/v*) ;;
            *)
              echo "Unexpected tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

          VERSION="${RELEASE_TAG##*/v}"
          PROJECT="terraform-provider-grafanaamg"
          MODULE_DIR="contrib/terraform-provider-grafanaamg"
          DIST="$PWD/dist/$PROJECT"
          BINARY="${PROJECT}_v${VERSION}"
          CHECKSUMS="${PROJECT}_${VERSION}_SHA256SUMS"

          rm -rf "$DIST"
          mkdir -p "$DIST"

          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            OUTDIR="$DIST/${GOOS}_${GOARCH}"
            mkdir -p "$OUTDIR"

            (
              cd "$MODULE_DIR"
              GOWORK=off CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
                go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "$OUTDIR/$BINARY" .
            )

            (
              cd "$OUTDIR"
              zip "../${PROJECT}_${VERSION}_${GOOS}_${GOARCH}.zip" "$BINARY"
            )
          done

          cp "$MODULE_DIR/terraform-registry-manifest.json" "$DIST/${PROJECT}_${VERSION}_manifest.json"

          (
            cd "$DIST"
            sha256sum *.zip "${PROJECT}_${VERSION}_manifest.json" > "$CHECKSUMS"
            gpg --batch --local-user "$GPG_FINGERPRINT" --output "${CHECKSUMS}.sig" --detach-sign "$CHECKSUMS"
          )

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG##*/v}"
          PROJECT="terraform-provider-grafanaamg"
          DIST="$PWD/dist/$PROJECT"
          BODY="$(mktemp)"
          cat > "$BODY" <<EOF
          Release ${PROJECT} ${VERSION}.

          Generated by the Grafana AMG provider recovery workflow.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$DIST"/* --clobber
          else
            gh release create "$RELEASE_TAG" "$DIST"/* \
              --title "$RELEASE_TAG" \
              --notes-file "$BODY"
          fi
