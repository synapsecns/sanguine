[profile.default]
# 2024-01-01
block_timestamp = 1_704_067_200
evm_version = "paris"
optimizer_runs = 1_000_000
src = 'contracts'
out = 'out'
libs = ["lib", "node_modules"]
ffi = true
gas_limit = 9223372036854775807
fs_permissions = [
    { access = "read", path = "./" },
    { access = "read-write", path = "./.deployments" }
]

[fmt]
ignore = ["contracts/legacy/**/*.sol"]
line_length = 120
multiline_func_header = 'all'
number_underscore = 'thousands'
sort_imports = true

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC}"
aurora = "${AURORA_RPC}"
avalanche = "${AVALANCHE_RPC}"
base = "${BASE_RPC}"
berachain = "${BERACHAIN_RPC}"
blast = "${BLAST_RPC}"
bnb = "${BNB_RPC}"
canto = "${CANTO_RPC}"
cronos = "${CRONOS_RPC}"
dfk = "${DFK_RPC}"
ethereum = "${ETHEREUM_RPC}"
fantom = "${FANTOM_RPC}"
harmony = "${HARMONY_RPC}"
hyperevm = "${HYPEREVM_RPC}"
kaia = "${KAIA_RPC}"
linea = "${LINEA_RPC}"
metis = "${METIS_RPC}"
moonbeam = "${MOONBEAM_RPC}"
moonriver = "${MOONRIVER_RPC}"
optimism = "${OPTIMISM_RPC}"
polygon = "${POLYGON_RPC}"
scroll = "${SCROLL_RPC}"
unichain = "${UNICHAIN_RPC}"
worldchain = "${WORLDCHAIN_RPC}"

# Testnets
arb_sepolia = "${ARB_SEPOLIA_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"
bnb_testnet = "${BNB_TESTNET_RPC}"
eth_sepolia = "${ETH_SEPOLIA_RPC}"
op_sepolia = "${OP_SEPOLIA_RPC}"
scroll_sepolia = "${SCROLL_SEPOLIA_RPC}"


