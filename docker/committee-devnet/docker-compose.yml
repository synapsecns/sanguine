version: '3.4'

# This compose file is expected to be used from make and not independently.

volumes:
  chain_a_data:
  chain_b_data:
  chain_c_data:
  committee_data:
  guard_data:
  notary43_data:
  scribe_data:
  prometheus-data:
  badger-data:
  notary44_data:
  executor_data:


services:
  omnirpc:
    restart: unless-stopped
    depends_on:
      - chain_a
      - chain_b
      - chain_c
      - tracing
    build:
      context: ../../
      dockerfile: docker/committee-devnet/omnirpc.Dockerfile
    ports:
      - '9001:9001'
    command: >
      omnirpc
      server
      --config=/config/omnirpc.yaml
    volumes:
      - '${PWD}/config/omnirpc.yaml:/config/omnirpc.yaml'
    environment:
      METRICS_HANDLER: jaeger
      JAEGER_ENDPOINT: 'http://tracing:14268/api/traces'

  chain_a:
    restart: unless-stopped
    image: 'ghcr.io/foundry-rs/foundry:latest'
    entrypoint: anvil
    platform: linux/amd64
    command: >
      --host=0.0.0.0
      --chain-id=42
      --allow-origin='*'
      --steps-tracing
      --mnemonic='tag volcano eight thank tide danger coast health above argue embrace heavy'
      --base-fee=1
      --gas-limit=100000000
      --state=/data/
    ports:
      - '8042:8545'
    volumes:
      - chain_a_data:/data

  chain_b:
    restart: unless-stopped
    image: 'ghcr.io/foundry-rs/foundry:latest'
    entrypoint: anvil
    platform: linux/amd64
    command: >
      --host=0.0.0.0
      --chain-id=43
      --allow-origin='*'
      --steps-tracing
      --mnemonic='tag volcano eight thank tide danger coast health above argue embrace heavy'
      --base-fee=1
      --gas-limit=100000000
      --state=/data/
    ports:
      - '8043:8545'
    volumes:
      - chain_b_data:/data

  chain_c:
    restart: unless-stopped
    image: 'ghcr.io/foundry-rs/foundry:latest'
    entrypoint: anvil
    platform: linux/amd64
    command: >
      --host=0.0.0.0
      --chain-id=44
      --allow-origin='*'
      --steps-tracing
      --mnemonic='tag volcano eight thank tide danger coast health above argue embrace heavy'
      --base-fee=1
      --gas-limit=100000000
      --state=/data/
    ports:
      - '8044:8545'
    volumes:
      - chain_c_data:/data

  tracing:
    restart: unless-stopped
    image: jaegertracing/all-in-one:latest
    ports:
      - 6831:6831/udp
      - 6832:6832/udp
      - 5778:5778
      - 16686:16686
      - 4317:4317
      - 4318:4318
      - 14250:14250
      - 14268:14268
      - 14269:14269
      - 9411:9411
    environment:
      SPAN_STORAGE_TYPE: 'badger'
      BADGER_EPHEMERAL: 'false'
      BADGER_DIRECTORY_VALUE: '/badger/data'
      BADGER_DIRECTORY_KEY: '/badger/key'
    volumes:
      - badger-data:/badger

  prometheus:
    restart: unless-stopped
    image: prom/prometheus:v2.46.0
    ports:
      - 9000:9090
    volumes:
      - '${PWD}/config/prometheus:/etc/prometheus'
      - prometheus-data:/prometheus
    command: --web.enable-lifecycle  --config.file=/etc/prometheus/prometheus.yml

  committee-node1:
    restart: unless-stopped
    entrypoint: committee
    depends_on:
      - omnirpc
      - chain_a
      - chain_b
      - chain_c
      - tracing
    build:
      context: ../../
      dockerfile: docker/committee-devnet/committee.Dockerfile
    volumes:
      - '${PWD}/config/committee-config1.yml:/config/committee-config1.yml'
      - '${PWD}/config/committee-signer1.txt:/config/committee-signer1.txt'
      - committee_data:/config/synapse.db
    command:
      - run
      - '--config'
      - /config/committee-config1.yml
    environment:
      METRICS_HANDLER: jaeger
      JAEGER_ENDPOINT: 'http://tracing:14268/api/traces'
      GOLOG_LOG_LEVEL: debug


  committee-node2:
    restart: unless-stopped
    entrypoint: committee
    depends_on:
      - omnirpc
      - chain_a
      - chain_b
      - chain_c
      - tracing
    build:
      context: ../../
      dockerfile: docker/committee-devnet/committee.Dockerfile
    command:
      - committee run
      - '--config'
      - '/config/committee-config2.yml'
    environment:
      METRICS_HANDLER: jaeger
      JAEGER_ENDPOINT: 'http://tracing:14268/api/traces'
      GOLOG_LOG_LEVEL: debug

  committee-node3:
    restart: unless-stopped
    entrypoint: committee
    depends_on:
      - omnirpc
      - chain_a
      - chain_b
      - chain_c
      - tracing
    build:
      context: ../../
      dockerfile: docker/committee-devnet/committee.Dockerfile
    command:
      - committee run
      - '--config'
      - '/config/committee-config3.yml'
    environment:
      METRICS_HANDLER: jaeger
      JAEGER_ENDPOINT: 'http://tracing:14268/api/traces'
      GOLOG_LOG_LEVEL: debug


